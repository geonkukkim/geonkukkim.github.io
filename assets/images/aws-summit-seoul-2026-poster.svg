<svg xmlns="http://www.w3.org/2000/svg" width="640" height="840" viewBox="0 0 640 840" role="img" aria-labelledby="title desc">
  <title id="title">AWS Summit Seoul 2026 poster</title>
  <desc id="desc">A compact poster for AWS Summit Seoul 2026 at COEX Convention Center.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#232f3e"/>
      <stop offset="52%" stop-color="#35465c"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#101820" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="640" height="840" rx="36" fill="url(#bg)"/>
  <path d="M510 90 C575 128 602 201 576 266 C550 331 481 360 416 336 C351 312 318 244 340 178 C362 112 445 52 510 90Z" fill="#ffffff" opacity="0.13"/>
  <path d="M68 672 C130 596 240 585 319 646 C398 707 421 812 380 840 L68 840Z" fill="#111827" opacity="0.25"/>

  <g transform="translate(78 82)">
    <text x="0" y="0" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="2">MAY 20-21, 2026</text>
    <text x="0" y="48" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="600">COEX, Seoul</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="78" y="198" width="484" height="354" rx="28" fill="#ffffff" opacity="0.9"/>
  </g>

  <g transform="translate(145 268)">
    <path d="M28 114 C66 54 134 28 203 50 C244 10 316 27 340 78 C389 83 426 123 426 174 C426 229 381 274 326 274 L94 274 C44 274 4 234 4 184 C4 153 20 127 44 112" fill="none" stroke="#232f3e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M110 190 C171 235 278 240 350 190" fill="none" stroke="#ff9900" stroke-width="18" stroke-linecap="round"/>
    <path d="M319 169 L359 190 L325 220" fill="none" stroke="#ff9900" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(78 634)">
    <text x="0" y="0" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="55" font-weight="800">AWS Summit</text>
    <text x="0" y="64" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="55" font-weight="800">Seoul 2026</text>
    <rect x="0" y="92" width="252" height="4" fill="#ffb84d"/>
    <text x="0" y="136" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">Physical AI | Humanoid Robotics</text>
  </g>
