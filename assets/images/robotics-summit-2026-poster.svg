<svg xmlns="http://www.w3.org/2000/svg" width="640" height="840" viewBox="0 0 640 840" role="img" aria-labelledby="title desc">
  <title id="title">Robotics Summit and Expo 2026 poster</title>
  <desc id="desc">A compact poster for Robotics Summit and Expo 2026 in Boston.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2f4f"/>
      <stop offset="48%" stop-color="#146c86"/>
      <stop offset="100%" stop-color="#f0a33a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.76"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#082033" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="640" height="840" rx="36" fill="url(#bg)"/>
  <circle cx="548" cy="98" r="108" fill="#ffffff" opacity="0.12"/>
  <circle cx="95" cy="748" r="160" fill="#082033" opacity="0.22"/>

  <g transform="translate(78 82)">
    <text x="0" y="0" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="2">MAY 27-28, 2026</text>
    <text x="0" y="48" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="600">Boston, MA</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="78" y="192" width="484" height="386" rx="26" fill="url(#panel)"/>
  </g>

  <g transform="translate(120 232)" fill="none" stroke="#12324a" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
    <path d="M80 232 C64 164 102 96 168 78 C234 60 304 96 326 160"/>
    <path d="M172 83 L172 42"/>
    <path d="M116 107 L82 73"/>
    <path d="M276 107 L310 73"/>
    <path d="M306 178 L352 178"/>
    <path d="M106 178 L60 178"/>
    <rect x="116" y="154" width="158" height="134" rx="38"/>
    <circle cx="160" cy="204" r="10" fill="#12324a" stroke="none"/>
    <circle cx="232" cy="204" r="10" fill="#12324a" stroke="none"/>
    <path d="M174 246 C192 258 214 258 232 246"/>
  </g>

  <g transform="translate(78 642)">
    <text x="0" y="0" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800">Robotics</text>
    <text x="0" y="62" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800">Summit &amp; Expo</text>
    <rect x="0" y="90" width="294" height="4" fill="#f6c56d"/>
    <text x="0" y="134" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">Physical AI | VLA | Deployment</text>
  </g>
</svg>
